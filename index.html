<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>doc.trades — Live Progress</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="styles.css">
  <script src="live_accounts_tradeData.js"></script>
  <style>
    a{
      color: inherit;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">doc <span>trades</span></div>
    <nav>
      <a href="/index.html" class="active">Live</a>
      <a href="/propfirm.html">PropFirm</a>
    </nav>
  </header>

  <main>


    <!-- Active Challenges -->
    <div class="section-label">Active Challenges</div>

    <!-- Vantage Live Challenge -->
     <script src="challenge/1.js"></script>
    <a class="nav-card" style="padding: 0px; margin-bottom: 20px; " href="/challenge/1.html">
      <div class="account-hero" style="margin: 0px;">
        <div class="account-hero-header">
          <div class="account-name">Turning $30 to $100
            <div class="card-subtitle">Vantage Live Account</div>
          </div>
          <div class="account-badge" id="v-status-badge">● On progress</div>
        </div>

        <div class="prog-wrap">
          <div class="prog-meta" >
            <p id="current_balance">Current Balance</p>
            <span id="v-pct" style="color:var(--accent);font-weight:700;">0%</span>

          </div>

          <div class="prog-bar">
            <div class="prog-fill" id="v-bar" style="width:0%"></div>
          </div>
          <div class="prog-meta" style="margin-top:0.4rem;">
            <p id="target_balance">Target Balance</p>
          </div>
        </div>


      </div>
    </a>

    
    <!-- Quick Nav -->
    <div class="section-label">Completed Challenges</div>

  </main>

  <footer>
    <div>BUILT IN PUBLIC · EVERY TRADE DOCUMENTED · NO SIGNAL SELLING</div>
  </footer>
  <script>
    //INIT STATS
    const totalPnl = tradeData.reduce((s, t) => s + t.pnl, 0);
    const currentBalance = startBalance + totalPnl;
    const pct = ((currentBalance - startBalance) / (target - startBalance) * 100).toFixed(2);
    document.getElementById('target_balance').textContent = 'Target Balance - $' + target.toFixed(2);
    document.getElementById('current_balance').textContent = 'Current Balance - $' + currentBalance.toFixed(2);
    document.getElementById('v-pct').textContent = pct + '%';
    document.getElementById('v-bar').style.width = Math.min(pct, 100) + '%';

  </script>
</body>

</html>
